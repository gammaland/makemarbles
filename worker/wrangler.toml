name = "makemarbles-sync"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# One Durable Object per account (ADR 2026-06-24). The DO name is the account_id.
[[durable_objects.bindings]]
name = "ACCOUNT_DO"
class_name = "AccountDO"

# SQLite-backed Durable Objects — available on the Workers free plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AccountDO"]

# Global account registry (SPEC §7.10). Real database_id is set at deploy.
[[d1_databases]]
binding = "DB"
database_name = "makemarbles-accounts"
database_id = "00000000-0000-0000-0000-000000000000"
